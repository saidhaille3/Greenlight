<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Greenlight Sports Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.08), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(212, 175, 55, 0.08), transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .ios-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }

        .fire-text {
            background: linear-gradient(135deg, #10b981 0%, #059669 35%, #fbbf24 65%, #d97706 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: brightness(1.2);
        }

        .auth-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }

        .btn-loading {
            pointer-events: none;
            opacity: 0.6;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="p-6">

    <div id="authCard" class="w-full max-w-[420px] ios-glass rounded-[3.5rem] p-10 md:p-14 fade-in">
        
        <div class="text-center mb-12">
            <div class="inline-block mb-4">
                <img src="/images/logo.png" alt="Logo" class="h-12 w-auto mb-4 mx-auto scale-110">
            </div>
            <h1 id="authTitle" class="fire-text text-4xl font-black uppercase tracking-tighter leading-none">Greenlight</h1>
            <p id="authSubtitle" class="text-[10px] font-black text-white/30 uppercase tracking-[0.4em] mt-3">Sports Network</p>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[9px] font-black text-white/40 uppercase tracking-[0.2em] ml-4">Email Address</label>
                <input type="email" id="email" placeholder="Email Address" class="auth-input w-full p-5 rounded-2xl text-xs font-bold outline-none text-white tracking-widest">
            </div>

            <div id="passWrapper" class="space-y-2">
                <div class="flex justify-between items-center px-4">
                    <label class="text-[9px] font-black text-white/40 uppercase tracking-[0.2em]">Password</label>
                    <button onclick="toggleResetMode(true)" class="text-[9px] font-black text-emerald-500 uppercase tracking-widest hover:text-yellow-500 transition-colors">Forgot?</button>
                </div>
                <input type="password" id="password" placeholder="••••••••" class="auth-input w-full p-5 rounded-2xl text-xs font-bold outline-none text-white tracking-[0.3em]">
            </div>

            <div id="statusArea" class="hidden text-[10px] font-black uppercase tracking-widest text-center py-3 rounded-xl border"></div>

<div class="pt-6 flex flex-col items-center gap-4">
    <button id="loginBtn" onclick="processLogin()" class="w-full max-w-[180px] py-2.5 bg-white text-black rounded-xl font-black uppercase text-[10px] tracking-[0.2em] shadow-2xl hover:bg-emerald-500 hover:text-white transition-all active:scale-95 flex items-center justify-center gap-3">
        <span id="btnText">Sign In</span>
    </button>

    <a href="createlogin.html" class="w-full max-w-[180px] py-2.5 bg-white/5 border border-white/10 text-white/40 rounded-xl font-black uppercase text-[9px] tracking-[0.2em] text-center hover:bg-white/10 hover:text-white transition-all active:scale-95">
        Create Account
    </a>

    <div id="socialWrapper" class="w-full flex flex-col items-center gap-3 border-t border-white/5 pt-6">
        <p class="text-[8px] font-black text-white/20 uppercase tracking-[0.4em] mb-2">Sign In With:</p>
        <div class="flex gap-4">
            <button onclick="handleGoogleLogin()" class="w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all active:scale-90">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" class="w-5 h-5">
            </button>
            <button onclick="handleAppleLogin()" class="w-12 h-12 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all active:scale-90">
                <i class="fa-brands fa-apple text-xl text-white"></i>
            </button>
        </div>
    </div>
</div>
        </div>
    </div>

<script type="module">
    // Direct CDN imports (Correct for your single-file setup)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, 
        GoogleAuthProvider, OAuthProvider, signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Your AUTHENTIC Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDyfaBrLbjIjgWaJb7DHf50zv7cn6lISi0",
      authDomain: "greenlight-a8e86.firebaseapp.com",
      projectId: "greenlight-a8e86",
      storageBucket: "greenlight-a8e86.firebasestorage.app",
      messagingSenderId: "367667201164",
      appId: "1:367667201164:web:b2b6cfbf54c5d47255e7a9",
      measurementId: "G-G9XX4LR0K7"
    };

    // Initialize
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // --- UI TOGGLE ENGINE ---
    window.toggleResetMode = (isResetting) => {
        const passWrapper = document.getElementById('passWrapper');
        const loginBtn = document.getElementById('loginBtn');
        const socialWrapper = document.getElementById('socialWrapper');
        const resetActions = document.getElementById('resetActions');
        const subtitle = document.getElementById('authSubtitle');
        const authTitle = document.getElementById('authTitle');
        
        if (isResetting) {
            passWrapper.classList.add('hidden');
            loginBtn.classList.add('hidden');
            socialWrapper.classList.add('hidden');
            resetActions.classList.remove('hidden');
            subtitle.innerText = "Account Recovery";
            if(authTitle) authTitle.classList.add('hidden');
        } else {
            passWrapper.classList.remove('hidden');
            loginBtn.classList.remove('hidden');
            socialWrapper.classList.remove('hidden');
            resetActions.classList.add('hidden');
            subtitle.innerText = "Sports Network";
            if(authTitle) authTitle.classList.remove('hidden');
        }
        hideStatus();
    };

    // --- EMAIL LOGIN ---
    window.processLogin = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        if (!email || !password) return showStatus("Credentials Required", "error");
        
        btn.classList.add('btn-loading');
        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = 'index.html';
        } catch (error) {
            btn.classList.remove('btn-loading');
            showStatus("INVALID", "error");
        }
    };

    // --- GOOGLE SECURE ACCESS ---
    window.handleGoogleLogin = async () => {
        try {
            await signInWithPopup(auth, new GoogleAuthProvider());
            window.location.href = 'index.html';
        } catch (e) { showStatus("GOOGLE FAILED", "error"); }
    };

    // --- APPLE SECURE ACCESS ---
    window.handleAppleLogin = async () => {
        try {
            await signInWithPopup(auth, new OAuthProvider('apple.com'));
            window.location.href = 'index.html';
        } catch (e) { showStatus("APPLE FAILED", "error"); }
    };

    // --- RESET REQUEST ---
    window.handleResetRequest = async () => {
        const email = document.getElementById('email').value;
        if (!email) return showStatus("EMAIL REQUIRED", "error");
        try {
            await sendPasswordResetEmail(auth, email);
            showStatus("LINK SENT", "success");
        } catch (e) { showStatus("FAILED", "error"); }
    };

    function showStatus(msg, type) {
        const status = document.getElementById('statusArea');
        status.innerText = msg;
        status.classList.remove('hidden');
        status.className = `text-[10px] font-black uppercase tracking-widest text-center py-3 rounded-xl border ${type === 'error' ? 'border-red-500/20 bg-red-500/10 text-red-500' : 'border-emerald-500/20 bg-emerald-500/10 text-emerald-500'}`;
    }
    function hideStatus() { document.getElementById('statusArea').classList.add('hidden'); }
</script>
</body>
</html>
